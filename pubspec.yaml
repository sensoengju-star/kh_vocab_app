name: khvocab
description: English-Khmer Vocabulary Trainer.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  uuid: ^4.4.0
  path_provider: ^2.1.3
  speech_to_text: ^7.0.0
  ffi: ^2.1.0
  win32: ^5.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
